<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>💚 Sabiduría Yoda</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #050a05;
    min-height: 100%;
  }
  body {
    display: flex;
    justify-content: center;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    position: relative;
    background: #000;
  }
  .yoda-img {
    width: 100%;
    height: auto;
    min-height: 60vh;
    object-fit: cover;
    display: block;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: filter 0.1s ease;
  }
  .yoda-img:active { filter: brightness(1.2) saturate(1.3); }
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }
  .bottom-fade { display: none; }
  .bubble {
    position: absolute;
    top: 28px;
    left: 14px;
    right: 14px;
    background: rgba(6, 18, 6, 0.93);
    border: 1.5px solid rgba(110, 195, 65, 0.5);
    border-radius: 20px;
    padding: 18px 20px 16px;
    color: #c0ee90;
    font-size: 15.5px;
    line-height: 1.6;
    text-align: center;
    font-style: italic;
    font-family: Georgia, serif;
    box-shadow: 0 0 30px rgba(70, 180, 30, 0.22), inset 0 0 14px rgba(70, 180, 30, 0.07);
    opacity: 0;
    transform: translateY(-10px) scale(0.97);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 10;
  }
  .bubble.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 13px solid rgba(6, 18, 6, 0.93);
  }
  .tap-hint {
    display: block;
    width: 100%;
    text-align: center;
    color: rgba(175, 215, 120, 0.75);
    font-size: 13px;
    letter-spacing: 0.07em;
    font-family: Georgia, serif;
    font-style: italic;
    pointer-events: none;
    transition: opacity 0.5s ease;
    animation: pulse 2.8s ease-in-out infinite;
    padding: 22px 0 10px;
    background: #000;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }
  .site-link {
    display: block;
    width: 100%;
    text-align: center;
    z-index: 20;
    background: #000;
    padding: 10px 0 32px;
  }
  .site-link a {
    color: rgba(175, 215, 120, 0.8);
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 0.09em;
    font-family: Georgia, serif;
    border-bottom: 1px solid rgba(175, 215, 120, 0.3);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .site-link a:hover { color: #aef04a; border-color: rgba(175, 215, 120, 0.7); }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(110, 220, 50, 0.22);
    transform: scale(0);
    animation: rip 0.65s linear forwards;
    pointer-events: none;
    z-index: 5;
  }
  @keyframes rip { to { transform: scale(5); opacity: 0; } }
</style>
</head>

  <div class="bottom-fade"></div>
  <div class="bubble" id="bubble"></div>
  <div class="tap-hint" id="tapHint">Toca a Yoda para recibir sabiduría…</div>

</div>
<script>
const phrases = [
  "Tu mejor vendedor, una landing page es. Trabaja mientras duermes, hmm.",
  "El 96% de visitantes no compran la primera vez. Hacer seguimiento, debes.",
  "¿Página genérica? Confusión crea. Claridad, una landing page trae, hmm.",
  "Cinco veces más conversiones, posible es. Creer en la página, debes.",
  "Tus perfiles sociales, enlazar debes. Tu comunidad crece mientras descansas.",
  "Una sola llamada a la acción. Un camino. La fricción, eliminarla debes, hmm.",
  "Mobile primero, el camino es. Perder clientes en móviles, no debes.",
  "El 80% de negocios sin página pierden clientes cada día. Comenzar, debes.",
  "Tu visión cuéntala, ellos diseñan. Lanza rápido, los clientes llegan. Simple, es.",
  "Buenas imágenes, un 48% más de leads traen. Subestimar el diseño, no debes.",
  "Desde el primer día, llegan los resultados. No temas el lanzamiento, hmm.",
  "Tu página trabaja de noche, de día, siempre. Descansar, puedes, hmm.",
  "Anuncios, redes, Google — una sola página para capturarlo todo. Poderoso, esto es.",
  "Revisa. Aprueba. Los ajustes incluidos están. Confía en el proceso, joven.",
  "A algún lugar digno enviarlos debes. No a tu página de inicio, hmm.",
];
let lastIdx = -1;
function getPhrase() {
  let i; do { i = Math.floor(Math.random() * phrases.length); } while (i === lastIdx);
  lastIdx = i; return phrases[i];
}
function playHum() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [
      { freq: 880,  start: 0.00, dur: 0.07, type: 'square' },
      { freq: 440,  start: 0.11, dur: 0.11, type: 'sine'   },
      { freq: 1320, start: 0.26, dur: 0.06, type: 'square' },
      { freq: 660,  start: 0.36, dur: 0.09, type: 'sine'   },
      { freq: 1100, start: 0.49, dur: 0.06, type: 'square' },
      { freq: 550,  start: 0.59, dur: 0.12, type: 'sine'   },
    ];
    notes.forEach(n => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = n.type;
      osc.frequency.value = n.freq;
      g.gain.setValueAtTime(0, ctx.currentTime + n.start);
      g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + n.start + 0.012);
      g.gain.setValueAtTime(0.18, ctx.currentTime + n.start + n.dur - 0.012);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + n.start + n.dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + n.start);
      osc.stop(ctx.currentTime + n.start + n.dur + 0.02);
    });
  } catch(e) {}
}
const bubble = document.getElementById('bubble');
const tapHint = document.getElementById('tapHint');
const phone = document.getElementById('phone');
let timer = null;
function activate(e) {
  const rect = phone.getBoundingClientRect();
  const cx = e.clientX || (e.changedTouches && e.changedTouches[0].clientX) || rect.left + rect.width/2;
  const cy = e.clientY || (e.changedTouches && e.changedTouches[0].clientY) || rect.top + rect.height/2;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `left:${cx - rect.left - 45}px;top:${cy - rect.top - 45}px;width:90px;height:90px`;
  phone.appendChild(r);
  setTimeout(() => r.remove(), 700);
  playHum();
  tapHint.style.opacity = '0';
  bubble.textContent = getPhrase();
  bubble.classList.add('visible');
  if (timer) clearTimeout(timer);
  timer = setTimeout(() => bubble.classList.remove('visible'), 5500);
}
const img = document.getElementById('yodaImg');
img.addEventListener('click', activate);
img.addEventListener('touchend', e => { e.preventDefault(); activate(e); });
</script>
